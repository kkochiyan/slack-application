version: "3.9"

service:
  postgres:
    image: postgres:16
    container_name: slack_postgres
    restart: always
    environment:
      POSTGRES_DB: messenger
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      ports:
        - "5432:5432"
      volumes:
        - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: slack_redis
    restart: always
    ports:
      - "6379:6379"

  volumes:
    poatgres_data: